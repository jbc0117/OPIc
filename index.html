<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OPIc 연습 프로그램</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #111827; /* bg-gray-900 */
            -webkit-tap-highlight-color: transparent;
        }
        .phone-container {
            /* Galaxy S25 Ultra (예상) 비율에 최적화 */
            max-width: 432px; /* 1440px / 3.33 (density) */
            width: 100%;
            height: 100vh;
            height: -webkit-fill-available; /* iOS Safari full height */
            margin: 0 auto;
            background-color: #030712; /* bg-gray-950 */
            display: flex;
            flex-direction: column;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
        .glass-ui {
            background: rgba(30, 41, 59, 0.5); /* bg-slate-800/50 */
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(51, 65, 85, 0.5); /* border-slate-700/50 */
        }
        .btn {
            transition: all 0.2s ease-in-out;
        }
        .btn:active {
            transform: scale(0.96);
            filter: brightness(0.9);
        }
        .list-item {
            background-color: #1f2937; /* bg-gray-800 */
            border: 1px solid #374151; /* border-gray-700 */
            transition: all 0.2s ease;
        }
        .list-item:hover {
            background-color: #374151; /* bg-gray-700 */
            border-color: #4f46e5; /* border-indigo-600 */
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="text-gray-200 flex items-center justify-center">

    <div class="phone-container relative overflow-hidden">

        <!-- 1. 첫 페이지 (메인 메뉴) -->
        <div id="main-menu-view" class="flex flex-col flex-grow justify-center items-center p-8 gap-6">
            <div class="text-center">
                <h1 class="text-3xl font-bold text-white">OPIc 연습 프로그램</h1>
                <p class="text-gray-400 mt-2">원하는 모드를 선택하세요.</p>
            </div>
            <div class="w-full space-y-4">
                <button onclick="showTopicList()" class="btn w-full bg-indigo-600 text-white font-bold py-4 rounded-lg text-lg">OPIc 연습</button>
                <button id="continue-btn" onclick="continueLastSession()" class="hidden btn w-full bg-sky-600 text-white font-bold py-4 rounded-lg text-lg">마지막 학습 이어하기</button>
                <button onclick="startReadKoreanMode()" class="btn w-full bg-gray-700 text-gray-300 font-bold py-4 rounded-lg text-lg">한글로 읽기</button>
                <button onclick="startReadEnglishMode()" class="btn w-full bg-gray-700 text-gray-300 font-bold py-4 rounded-lg text-lg">영어로 읽기</button>
            </div>
        </div>

        <!-- 2. 대제목 리스트 뷰 -->
        <div id="topic-list-view" class="hidden p-4 flex flex-col h-full">
            <header class="flex-shrink-0 flex items-center gap-4 mb-4">
                <button onclick="goBack()" class="btn w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
                <h2 class="text-xl font-bold text-white">주제 선택</h2>
            </header>
            <main id="topic-list-container" class="flex-grow overflow-y-auto no-scrollbar space-y-3"></main>
        </div>

        <!-- 3. 소제목 리스트 뷰 -->
        <div id="subtopic-list-view" class="hidden p-4 flex flex-col h-full">
            <header class="flex-shrink-0 flex items-center gap-4 mb-4">
                <button onclick="goBack()" class="btn w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
                <h2 id="subtopic-list-title" class="text-xl font-bold text-white flex-grow">소제목 선택</h2>
                <button onclick="resetCurrentTopicProgress()" class="btn text-sm text-gray-400 hover:text-white flex-shrink-0">진행도 초기화</button>
            </header>
            <main id="subtopic-list-container" class="flex-grow overflow-y-auto no-scrollbar space-y-3"></main>
        </div>

        <!-- 4. 연습 뷰 -->
        <div id="practice-view" class="hidden p-4 flex flex-col h-full">
            <header class="flex-shrink-0 flex items-center gap-4 mb-4">
                <button onclick="goBack()" class="btn w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
                <div class="flex-grow overflow-hidden">
                    <h2 id="practice-title" class="text-lg font-bold text-white"></h2>
                    <p id="practice-progress" class="text-sm text-gray-400"></p>
                </div>
                <button onclick="toggleSettingsModal(true)" class="btn w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center flex-shrink-0"><i class="fas fa-cog"></i></button>
            </header>
            
            <main class="flex-grow flex flex-col gap-4 overflow-hidden">
                <!-- 질문 영역 -->
                <div id="question-area" class="glass-ui rounded-lg p-5 flex-grow flex flex-col justify-center gap-4">
                    <div class="flex items-start gap-3">
                        <span class="text-indigo-400 font-bold text-sm mt-1">EN</span>
                        <p id="question-en" class="text-lg font-semibold text-white flex-grow"></p>
                    </div>
                    <hr class="border-gray-700">
                    <div class="flex items-start gap-3">
                        <span class="text-gray-400 font-bold text-sm mt-1">KR</span>
                        <p id="question-ko" class="text-md text-gray-300 flex-grow"></p>
                    </div>
                </div>

                <!-- 답변 영역 -->
                <div id="answer-area" class="hidden glass-ui rounded-lg p-5 flex-grow flex flex-col justify-center gap-4">
                     <div class="flex items-start gap-3">
                        <span class="text-gray-400 font-bold text-sm mt-1">KR</span>
                        <p id="answer-ko" class="text-lg font-semibold text-white flex-grow"></p>
                    </div>
                    <hr class="border-gray-700">
                    <div id="answer-en-container" class="hidden">
                        <div class="flex items-start gap-3">
                            <span class="text-indigo-400 font-bold text-sm mt-1">EN</span>
                            <p id="answer-en" class="text-md text-gray-300 flex-grow"></p>
                        </div>
                    </div>
                    <button id="show-answer-btn" onclick="showAnswer()" class="btn w-full bg-emerald-600 text-white font-bold rounded-lg mt-2 flex items-center justify-center gap-2 aspect-[4/1]">
                        <i class="fas fa-eye"></i>정답 보기
                    </button>
                </div>
            </main>

            <footer class="flex-shrink-0 grid grid-cols-2 gap-4 pt-4">
                <button onclick="navigate(-1)" class="btn bg-gray-700 text-white font-bold rounded-lg flex items-center justify-center gap-2 aspect-[2/1]">
                    <i class="fas fa-chevron-left"></i> 이전
                </button>
                <button onclick="navigate(1)" class="btn bg-indigo-600 text-white font-bold rounded-lg flex items-center justify-center gap-2 aspect-[2/1]">
                    다음 <i class="fas fa-chevron-right"></i>
                </button>
            </footer>
        </div>

        <!-- 5. 읽기 모드 뷰 (한글/영어 공용) -->
        <div id="reading-view" class="hidden p-4 flex flex-col h-full">
            <header class="flex-shrink-0 flex items-center gap-4 mb-4">
                <button onclick="goBack()" class="btn w-10 h-10 bg-gray-800 rounded-full flex items-center justify-center"><i class="fas fa-arrow-left"></i></button>
                <div class="flex-grow overflow-hidden">
                    <h2 id="reading-title" class="text-lg font-bold text-white"></h2>
                </div>
            </header>
            
            <main class="flex-grow flex flex-col gap-4 overflow-hidden">
                <!-- 질문/답변 영역 -->
                <div id="reading-content-area" class="glass-ui rounded-lg p-5 flex-grow flex flex-col justify-center gap-4">
                    <!-- This will be populated by JS -->
                </div>
            </main>

            <footer class="flex-shrink-0 pt-4 space-y-4">
                <button id="continuous-play-btn" onclick="toggleContinuousPlay()" class="btn w-full bg-purple-600 text-white font-bold py-4 rounded-lg text-lg"><i class="fas fa-infinity mr-2"></i> 연속 듣기</button>
                <button id="sentence-practice-btn" onclick="toggleSentenceBySentencePractice()" class="hidden btn w-full bg-teal-600 text-white font-bold py-4 rounded-lg text-lg"><i class="fas fa-headphones-alt mr-2"></i> 한 문장씩 연습하기</button>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="navigateReadingMode(-1)" class="btn bg-gray-700 text-white font-bold rounded-lg flex items-center justify-center gap-2 aspect-[2/1]">
                        <i class="fas fa-chevron-left"></i> 이전
                    </button>
                    <button onclick="navigateReadingMode(1)" class="btn bg-indigo-600 text-white font-bold rounded-lg flex items-center justify-center gap-2 aspect-[2/1]">
                        다음 <i class="fas fa-chevron-right"></i>
                    </button>
                </div>
            </footer>
        </div>

        <!-- Settings Modal -->
        <div id="settings-modal" class="hidden absolute inset-0 bg-black bg-opacity-75 flex items-center justify-center p-4 z-50">
            <div class="glass-ui rounded-xl p-6 w-full max-w-sm">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-xl font-bold text-white">설정</h3>
                    <button onclick="toggleSettingsModal(false)" class="btn w-8 h-8 rounded-full flex items-center justify-center text-gray-400 hover:bg-gray-700"><i class="fas fa-times"></i></button>
                </div>
                
                <div class="space-y-6">
                    <!-- Volume Control -->
                    <div>
                        <label for="volume-slider" class="block text-sm font-medium text-gray-300 mb-2">음량 조절</label>
                        <input id="volume-slider" type="range" min="0.1" max="1" step="0.1" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                    </div>

                    <!-- Speed Control -->
                    <div>
                        <label for="rate-slider" class="block text-sm font-medium text-gray-300 mb-2">재생 속도</label>
                        <input id="rate-slider" type="range" min="0.5" max="1.5" step="0.1" class="w-full h-2 bg-gray-600 rounded-lg appearance-none cursor-pointer">
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="generated_opicData.js"></script>
    <script>
        // --- STATE MANAGEMENT ---
        let activeTopicIndex = null;
        let activeSubTopicIndex = null;
        let currentStage = 'question'; // 'question' or 'answer'
        let currentAnswerSentenceIndex = -1;

        let answerSentences = { ko: [], en: [] };
        let viewStack = ['main-menu-view'];
        let currentAppMode = 'opic'; // 'opic', 'read-korean', or 'read-english'
        let isContinuousPlayActive = false;
        let isSentencePracticeActive = false;
        let playbackRate = 0.95;
        let playbackVolume = 1.0;

        // --- DOM ELEMENTS ---
        const views = {
            main: document.getElementById('main-menu-view'),
            topics: document.getElementById('topic-list-view'),
            subtopics: document.getElementById('subtopic-list-view'),
            practice: document.getElementById('practice-view'),
            reading: document.getElementById('reading-view'),
        };
        const settingsModal = document.getElementById('settings-modal');
        const volumeSlider = document.getElementById('volume-slider');
        const rateSlider = document.getElementById('rate-slider');
        const continuousPlayBtn = document.getElementById('continuous-play-btn');

        // --- INITIALIZATION ---
        document.addEventListener('DOMContentLoaded', () => {
            // Pre-load voices for TTS
            speechSynthesis.getVoices();

            // Check for last session and show continue button if it exists
            const continueBtn = document.getElementById('continue-btn');
            if (localStorage.getItem(LAST_SESSION_KEY)) {
                continueBtn.classList.remove('hidden');
            }

            // Load saved settings
            playbackRate = parseFloat(localStorage.getItem(RATE_STORAGE_KEY)) || 0.95;
            playbackVolume = parseFloat(localStorage.getItem(VOLUME_STORAGE_KEY)) || 1.0;
            rateSlider.value = playbackRate;
            volumeSlider.value = playbackVolume;

            // Add event listeners for sliders
            volumeSlider.addEventListener('input', (e) => {
                playbackVolume = parseFloat(e.target.value);
                localStorage.setItem(VOLUME_STORAGE_KEY, playbackVolume);
            });
            rateSlider.addEventListener('input', (e) => {
                playbackRate = parseFloat(e.target.value);
                localStorage.setItem(RATE_STORAGE_KEY, playbackRate);
            });
        });

        // --- KEYDOWN EVENT LISTENER (for Volume Button) ---
        window.addEventListener('keydown', (event) => {
            const currentViewId = viewStack[viewStack.length - 1];
            // 연습 화면일 때만 볼륨 내리기 버튼을 '다음' 기능으로 사용
            if (currentViewId === 'practice-view') {
                if (event.key === 'AudioVolumeDown') {
                    event.preventDefault(); // 볼륨 조절 기본 동작 방지
                    navigate(1); // '다음' 기능 실행
                }
            }
        });

        // --- LOCAL STORAGE (for Progress) ---
        const PROGRESS_STORAGE_KEY = 'opicAppProgress';
        const LAST_SESSION_KEY = 'opicAppLastSession';
        const RATE_STORAGE_KEY = 'opicAppRate';
        const VOLUME_STORAGE_KEY = 'opicAppVolume';

        function getProgressKey(topicIndex, subTopicIndex) {
            return `${topicIndex}-${subTopicIndex}`;
        }

        function saveProgress(topicIndex, subTopicIndex, stage, sentenceIndex) {
            try {
                const allProgress = JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY)) || {};
                const key = getProgressKey(topicIndex, subTopicIndex);
                
                allProgress[key] = {
                    stage: stage,
                    sentenceIndex: sentenceIndex,
                };
                
                localStorage.setItem(PROGRESS_STORAGE_KEY, JSON.stringify(allProgress));

                // Also save this as the last accessed session
                const lastSession = { topicIndex, subTopicIndex };
                localStorage.setItem(LAST_SESSION_KEY, JSON.stringify(lastSession));
            } catch (e) {
                console.error("Failed to save progress:", e);
            }
        }

        function loadProgress(topicIndex, subTopicIndex) {
            try {
                const allProgress = JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY)) || {};
                return allProgress[getProgressKey(topicIndex, subTopicIndex)] || null;
            } catch (e) {
                console.error("Failed to load progress:", e);
                return null;
            }
        }

        // --- VIEW NAVIGATION ---
        function showView(viewId) {
            const currentViewId = viewStack[viewStack.length - 1];
            if (currentViewId === viewId) return;

            const currentView = document.getElementById(currentViewId);
            const nextView = document.getElementById(viewId);

            if (currentView) currentView.classList.add('hidden');
            if (nextView) nextView.classList.remove('hidden');
            
            viewStack.push(viewId);
        }

        function toggleSettingsModal(show) {
            if (show) {
                settingsModal.classList.remove('hidden');
            } else {
                settingsModal.classList.add('hidden');
            }
        }

        function toggleContinuousPlay() {
            isContinuousPlayActive = !isContinuousPlayActive;
            if (isContinuousPlayActive) {
                continuousPlayBtn.innerHTML = '<i class="fas fa-stop-circle mr-2"></i> 연속 듣기 중지';
                continuousPlayBtn.classList.remove('bg-purple-600');
                continuousPlayBtn.classList.add('bg-red-600');
            } else {
                // speechSynthesis.cancel(); // 연속 듣기 중지 시 음성 재생을 중단하지 않고, 다음 자동 넘김만 방지합니다.
                continuousPlayBtn.innerHTML = '<i class="fas fa-infinity mr-2"></i> 연속 듣기';
                continuousPlayBtn.classList.remove('bg-red-600');
                continuousPlayBtn.classList.add('bg-purple-600');
            }
        }

        function goBack() {
            speechSynthesis.cancel(); // Stop any ongoing speech
            if (viewStack.length <= 1) return;

            const currentViewId = viewStack.pop();
            const prevViewId = viewStack[viewStack.length - 1];

            // If leaving practice view, save progress and refresh subtopic list
            if (currentViewId === 'practice-view') {
                saveProgress(activeTopicIndex, activeSubTopicIndex, currentStage, currentAnswerSentenceIndex);
                if (prevViewId === 'subtopic-list-view') {
                    renderSubTopicList(activeTopicIndex);
                }
            }

            // 읽기 모드를 나갈 때 연속 듣기 상태 초기화
            if (currentViewId === 'reading-view' && isContinuousPlayActive) {
                isContinuousPlayActive = false;
                continuousPlayBtn.innerHTML = '<i class="fas fa-infinity mr-2"></i> 연속 듣기';
                continuousPlayBtn.classList.remove('bg-red-600');
                continuousPlayBtn.classList.add('bg-purple-600');
            }
            // 읽기 모드를 나갈 때 한 문장씩 연습하기 상태 초기화
            if (currentViewId === 'reading-view' && isSentencePracticeActive) {
                isSentencePracticeActive = false;
                const practiceBtn = document.getElementById('sentence-practice-btn');
                practiceBtn.disabled = false;
                practiceBtn.innerHTML = '<i class="fas fa-headphones-alt mr-2"></i> 한 문장씩 연습하기';
                practiceBtn.classList.remove('bg-red-600');
                practiceBtn.classList.add('bg-teal-600');
            }

            // If returning to main menu, ensure continue button is visible if needed
            if (prevViewId === 'main-menu-view') {
                const continueBtn = document.getElementById('continue-btn');
                if (localStorage.getItem(LAST_SESSION_KEY)) {
                    continueBtn.classList.remove('hidden');
                }
            }

            const currentView = document.getElementById(currentViewId);
            const prevView = document.getElementById(prevViewId);

            if (currentView) currentView.classList.add('hidden');
            if (prevView) prevView.classList.remove('hidden');
        }

        // --- RENDERING ---
        function showTopicList() {
            const container = document.getElementById('topic-list-container');
            container.innerHTML = opicData.map((topic, index) => `
                <div class="list-item rounded-lg p-4 cursor-pointer" onclick="showSubTopicList(${index})">
                    <p class="text-sm text-gray-400">${String(index + 1).padStart(2, '0')}</p>
                    <h3 class="text-lg font-bold text-white mt-1">${topic.title.replace(/★/g, '').trim()}</h3>
                </div>
            `).join('');
            showView('topic-list-view');
        }

        function startReadKoreanMode() {
            currentAppMode = 'read-korean';
            showTopicList();
        }

        function startReadEnglishMode() {
            currentAppMode = 'read-english';
            showTopicList();
        }

        function renderSubTopicList(topicIndex) {
            const topic = opicData[topicIndex];
            const container = document.getElementById('subtopic-list-container');
            const allProgress = JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY)) || {};
            
            document.getElementById('subtopic-list-title').innerText = topic.title.replace(/★/g, '').trim();

            container.innerHTML = topic.slides.map((slide, index) => {
                // 데이터가 비정상적인 경우를 대비한 방어 코드
                if (!slide) return '';

                const progressKey = getProgressKey(topicIndex, index);
                const savedProgress = allProgress[progressKey];
                let progressHTML = '';

                if (savedProgress) {
                    const totalAnswerSentences = (slide.answer_ko || '').split('\n').filter(s => s.trim() !== '').length;
                    const totalSteps = 1 + totalAnswerSentences; // 1 for question
                    let completedSteps = 0;
                    if (savedProgress.stage === 'answer') {
                        completedSteps = 1 + savedProgress.sentenceIndex;
                    }
                    
                    const percentage = totalSteps > 0 ? Math.round((completedSteps / totalSteps) * 100) : 0;

                    progressHTML = `
                        <div class="mt-3">
                            <div class="flex justify-between items-center mb-1">
                                <span class="text-xs font-medium text-indigo-400">진행률</span>
                                <span class="text-xs font-medium text-indigo-400">${percentage}%</span>
                            </div>
                            <div class="w-full bg-gray-600 rounded-full h-1.5">
                                <div class="bg-indigo-500 h-1.5 rounded-full" style="width: ${percentage}%"></div>
                            </div>
                        </div>
                    `;
                }

                return `
                    <div class="list-item rounded-lg p-4 cursor-pointer" onclick="selectSubTopic(${index})">
                        <div class="flex justify-between items-center">
                            <p class="flex-grow pr-4 font-medium">${(slide.subtitle || '제목 없음').replace(/\n/g, '<br>')}</p>
                            <i class="fas fa-chevron-right text-gray-500"></i>
                        </div>
                        ${progressHTML}
                    </div>
                `;
            }).join('');
        }

        function showSubTopicList(topicIndex) {
            activeTopicIndex = topicIndex;
            renderSubTopicList(topicIndex);
            showView('subtopic-list-view');
        }

        function selectSubTopic(subTopicIndex) {
            if (currentAppMode === 'opic') {
                startPractice(subTopicIndex);
            } else { // 'read-korean' or 'read-english'
                startReadingPractice(subTopicIndex);
            }
        }

        function continueLastSession() {
            try {
                const lastSessionData = localStorage.getItem(LAST_SESSION_KEY);
                if (!lastSessionData) {
                    alert('마지막 학습 기록이 없습니다.');
                    return;
                }
                const { topicIndex, subTopicIndex } = JSON.parse(lastSessionData);

                // Set the global state before starting practice
                currentAppMode = 'opic'; // 이어하기는 항상 OPIc 연습 모드로 가정
                activeTopicIndex = topicIndex;
                
                // The startPractice function will handle the rest, including asking to continue
                startPractice(subTopicIndex);

            } catch (e) {
                console.error("Failed to continue last session:", e);
                alert('학습 기록을 불러오는 데 실패했습니다.');
            }
        }

        // --- PRACTICE LOGIC ---
        function startPractice(subTopicIndex) {
            activeSubTopicIndex = subTopicIndex;
            const slide = opicData[activeTopicIndex].slides[activeSubTopicIndex];

            // 데이터가 비정상적인 경우를 대비한 방어 코드
            if (!slide || typeof slide.subtitle === 'undefined') {
                alert('학습 데이터를 불러오는 데 실패했습니다. 데이터를 확인해주세요.');
                goBack();
                return;
            }

            // Prepare answer sentences
            answerSentences.ko = (slide.answer_ko || '').split('\n').filter(s => s.trim() !== '');
            answerSentences.en = (slide.answer_en || '').split('\n').filter(s => s.trim() !== '');

            document.getElementById('practice-title').innerHTML = (slide.subtitle || '').replace(/\n/g, '<br>');
            
            // Load progress or start fresh
            const savedProgress = loadProgress(activeTopicIndex, activeSubTopicIndex);
            if (savedProgress && confirm('이어서 학습하시겠습니까? (취소를 누르면 처음부터 시작합니다.)')) {
                currentStage = savedProgress.stage;
                currentAnswerSentenceIndex = savedProgress.sentenceIndex;
            } else {
                currentStage = 'question';
                currentAnswerSentenceIndex = -1;
            }
            
            updatePracticeView();
            showView('practice-view');
            
            // Auto-play based on loaded state
            if (currentStage === 'question') {
                speak(slide.question_en, 'en-US');
            } else {
                speak(answerSentences.ko[currentAnswerSentenceIndex], 'ko-KR');
            }
        }

        function startReadingPractice(subTopicIndex) {
            activeSubTopicIndex = subTopicIndex;
            const slide = opicData[activeTopicIndex].slides[activeSubTopicIndex];

            if (!slide || typeof slide.subtitle === 'undefined') {
                alert('학습 데이터를 불러오는 데 실패했습니다. 데이터를 확인해주세요.');
                goBack();
                return;
            }

            document.getElementById('reading-title').innerHTML = (slide.subtitle || '').replace(/\n/g, '<br>');
            const contentArea = document.getElementById('reading-content-area');
            const practiceBtn = document.getElementById('sentence-practice-btn');

            // 모드에 따라 '한 문장씩 연습하기' 버튼 보이기/숨기기
            if (currentAppMode === 'read-korean') {
                practiceBtn.classList.remove('hidden');
            } else { // 'read-english'
                practiceBtn.classList.add('hidden');
            }

            contentArea.innerHTML = `
                <div class="flex items-start gap-3">
                    <span class="text-indigo-400 font-bold text-sm mt-1">EN</span>
                    <p class="text-lg font-semibold text-white flex-grow">${slide.question_en || ''}</p>
                </div>
                <hr class="border-gray-700">
                <div class="flex items-start gap-3">
                    <span class="text-gray-400 font-bold text-sm mt-1">KR</span>
                    <p class="text-md text-gray-300 flex-grow">${slide.question_ko || ''}</p>
                </div>
            `;
            
            showView('reading-view');

            speak(slide.question_en, 'en-US', () => {
                setTimeout(() => {
                    let answerTextForDisplay = '';
                    let textToSpeak = '';
                    let answerLang = '';

                    const practiceBtn = document.getElementById('sentence-practice-btn');
                    if (currentAppMode === 'read-korean') {
                        answerTextForDisplay = (slide.answer_ko || '').replace(/\n/g, '<br>');
                        textToSpeak = slide.answer_ko || '';
                        answerLang = 'ko-KR';
                        practiceBtn.disabled = false;
                        practiceBtn.innerHTML = '<i class="fas fa-headphones-alt mr-2"></i> 한 문장씩 연습하기';
                    } else { // 'read-english'
                        answerTextForDisplay = (slide.answer_en || '').replace(/\n/g, '<br>');
                        textToSpeak = slide.answer_en || '';
                        answerLang = 'en-US';
                    }

                    // 화면을 항상 답변으로 전환합니다.
                    contentArea.innerHTML = `<p class="text-lg font-semibold text-white flex-grow">${answerTextForDisplay}</p>`;

                    // '한 문장씩 연습하기'가 활성화되어 있지 않을 때만 전체 답변을 읽어줍니다.
                    if (isSentencePracticeActive) {
                        // 연속 듣기 중 '한 문장씩 연습하기'가 켜져 있었다면, 다음 소제목에서도 이어서 실행합니다.
                        sentencePracticeSentences = (slide.answer_ko || '').split('\n').filter(s => s.trim() !== '');
                        readSentencesWithDelay(0);
                    } else {
                        const onAnswerEnd = () => {
                            if (isContinuousPlayActive) {
                                setTimeout(() => {
                                    navigateReadingMode(1);
                                }, 1500); // 1.5초 후 다음으로 자동 이동
                            }
                        };
                        speak(textToSpeak, answerLang, onAnswerEnd);
                    }
                }, 1000);
            });
        }

        function updatePracticeView() {
            const slide = opicData[activeTopicIndex].slides[activeSubTopicIndex];
            const questionArea = document.getElementById('question-area');
            const answerArea = document.getElementById('answer-area');
            const progressText = document.getElementById('practice-progress');

            if (currentStage === 'question') {
                questionArea.classList.remove('hidden');
                answerArea.classList.add('hidden');

                document.getElementById('question-en').innerText = slide.question_en || '';
                document.getElementById('question-ko').innerText = slide.question_ko || '';
                progressText.innerText = '질문 단계';
            } else { // 'answer' stage
                questionArea.classList.add('hidden');
                answerArea.classList.remove('hidden');

                if (currentAnswerSentenceIndex >= 0 && currentAnswerSentenceIndex < answerSentences.ko.length) {
                    document.getElementById('answer-ko').innerText = answerSentences.ko[currentAnswerSentenceIndex];
                    document.getElementById('answer-en').innerText = answerSentences.en[currentAnswerSentenceIndex] || "[영어 답변 없음]";
                    
                    // Hide English answer initially
                    document.getElementById('answer-en-container').classList.add('hidden');
                    document.getElementById('show-answer-btn').classList.remove('hidden');
                    
                    progressText.innerText = `답변 ${currentAnswerSentenceIndex + 1} / ${answerSentences.ko.length}`;
                }
            }
        }

        function navigate(direction) {
            speechSynthesis.cancel();

            if (currentStage === 'question') {
                if (direction > 0) { // '다음' from question
                    currentStage = 'answer';
                    currentAnswerSentenceIndex = 0;
                    updatePracticeView();
                    speak(answerSentences.ko[0], 'ko-KR');
                }
                // '이전' from question does nothing, or could go back to subtopic list
            } else { // 'answer' stage
                const newIndex = currentAnswerSentenceIndex + direction;

                if (newIndex < 0) { // '이전' from first answer sentence
                    currentStage = 'question';
                    currentAnswerSentenceIndex = -1;
                    updatePracticeView();
                    speak(opicData[activeTopicIndex].slides[activeSubTopicIndex].question_en, 'en-US');
                } else if (newIndex >= answerSentences.ko.length) { 
                    alert('마지막 문장입니다.');
                    // Don't update index, so progress remains at the last sentence
                } else {
                    currentAnswerSentenceIndex = newIndex;
                    updatePracticeView();
                    speak(answerSentences.ko[currentAnswerSentenceIndex], 'ko-KR');
                }
            }
            // Save progress after any navigation
            saveProgress(activeTopicIndex, activeSubTopicIndex, currentStage, currentAnswerSentenceIndex);
        }

        function showAnswer() {
            document.getElementById('answer-en-container').classList.remove('hidden');
            document.getElementById('show-answer-btn').classList.add('hidden');
            if (currentAnswerSentenceIndex !== -1) {
                speak(answerSentences.en[currentAnswerSentenceIndex], 'en-US');
            }
        }

        function navigateReadingMode(direction) {
            speechSynthesis.cancel(); // Stop any ongoing speech

            const newSubTopicIndex = activeSubTopicIndex + direction;
            const totalSlides = opicData[activeTopicIndex].slides.length;

            if (newSubTopicIndex < 0) {
                alert('첫 번째 소제목입니다.');
                return;
            }

            if (newSubTopicIndex >= totalSlides) {
                alert('마지막 소제목입니다.');
                return;
            }

            // Navigate to the new sub-topic practice
            startReadingPractice(newSubTopicIndex);
        }

        function resetCurrentTopicProgress() {
            if (!confirm(`'${opicData[activeTopicIndex].title.replace(/★/g, '').trim()}' 주제의 모든 진행 기록을 삭제하시겠습니까?`)) {
                return;
            }

            try {
                const allProgress = JSON.parse(localStorage.getItem(PROGRESS_STORAGE_KEY)) || {};
                let changed = false;
                Object.keys(allProgress).forEach(key => {
                    if (key.startsWith(`${activeTopicIndex}-`)) {
                        delete allProgress[key];
                        changed = true;
                    }
                });

                localStorage.setItem(PROGRESS_STORAGE_KEY, JSON.stringify(allProgress));
                renderSubTopicList(activeTopicIndex); // Re-render to remove progress bars
                alert('진행 기록이 초기화되었습니다.');
            } catch (e) { console.error("Failed to reset progress:", e); }
        }

        let sentencePracticeSentences = [];

        function readSentencesWithDelay(index) {
            const practiceBtn = document.getElementById('sentence-practice-btn');
            // 연습이 끝났는지 확인합니다.
            if (index >= sentencePracticeSentences.length) {

                // '연속 듣기'가 활성화된 경우 다음 소제목으로 이동합니다.
                if (isContinuousPlayActive) {
                    setTimeout(() => { navigateReadingMode(1); }, 1500);
                }

                // 연습이 끝나면 버튼 상태를 초기화합니다.
                isSentencePracticeActive = false;
                practiceBtn.disabled = false;
                practiceBtn.innerHTML = '<i class="fas fa-redo-alt mr-2"></i> 다시 연습하기';
                practiceBtn.classList.remove('bg-red-600');
                practiceBtn.classList.add('bg-teal-600');
                return;
            }

            // 다음 문장을 재생하고, 재생이 끝나면 상태에 따라 다음 문장을 호출합니다.
            speak(sentencePracticeSentences[index], 'ko-KR', () => {
                if (isSentencePracticeActive) {
                    // '한 문장씩 연습하기'가 켜져 있으면 3초 후 다음 문장 재생
                    setTimeout(() => {
                        readSentencesWithDelay(index + 1);
                    }, 3000);
                } else {
                    // '한 문장씩 연습하기'가 꺼져 있으면 바로 다음 문장 재생
                    readSentencesWithDelay(index + 1);
                }
            });
        }

        function toggleSentenceBySentencePractice() {
            isSentencePracticeActive = !isSentencePracticeActive;
            const practiceBtn = document.getElementById('sentence-practice-btn');

            if (isSentencePracticeActive) {
                practiceBtn.innerHTML = '<i class="fas fa-stop-circle mr-2"></i> 연습 중지';
                practiceBtn.classList.remove('bg-teal-600');
                practiceBtn.classList.add('bg-red-600');

                // 음성이 재생 중이 아닐 때(질문 재생 중 포함)만 새로 시작합니다.
                // 이렇게 하면 연속 재생 중에 버튼을 다시 켜도 처음부터 재시작되지 않습니다.
                const contentArea = document.getElementById('reading-content-area');
                const isQuestionShowing = contentArea.querySelector('span.text-indigo-400') !== null;

                if (isQuestionShowing || !speechSynthesis.speaking) {
                    speechSynthesis.cancel();
                    
                    const slide = opicData[activeTopicIndex].slides[activeSubTopicIndex];
                    const answerTextForDisplay = (slide.answer_ko || '').replace(/\n/g, '<br>');
                    contentArea.innerHTML = `<p class="text-lg font-semibold text-white flex-grow">${answerTextForDisplay}</p>`;

                    sentencePracticeSentences = (slide.answer_ko || '').split('\n').filter(s => s.trim() !== '');
                    readSentencesWithDelay(0);
                }
            } else {
                // 기능을 끌 때, 재생 중인 음성은 멈추지 않고 다음 3초 딜레이만 건너뛰게 됩니다.
                practiceBtn.innerHTML = '<i class="fas fa-headphones-alt mr-2"></i> 한 문장씩 연습하기';
                practiceBtn.classList.remove('bg-red-600');
                practiceBtn.classList.add('bg-teal-600');
            }
        }

        // --- TTS (Text-to-Speech) ---
        function speak(text, lang, onEndCallback = null) {
            if (!text || !('speechSynthesis' in window)) return;

            speechSynthesis.cancel(); // Cancel previous speech

            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = lang;

            // Voice selection for better quality
            const voices = speechSynthesis.getVoices();
            if (lang === 'ko-KR') {
                const koreanVoice = voices.find(v => v.lang === 'ko-KR');
                if (koreanVoice) utterance.voice = koreanVoice;
            } else if (lang === 'en-US') {
                // Prefer Google voices if available
                const googleVoice = voices.find(v => v.lang === 'en-US' && v.name.includes('Google'));
                utterance.voice = googleVoice || voices.find(v => v.lang === 'en-US');
            }
            
            if (onEndCallback) {
                utterance.onend = onEndCallback;
            }

            utterance.rate = playbackRate;
            utterance.volume = playbackVolume;
            speechSynthesis.speak(utterance);
        }

    </script>
