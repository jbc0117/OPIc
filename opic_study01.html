<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OPIc Study</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 16px;
        }
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
            overflow: hidden;
            margin-top: 20px;
        }
        .header {
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: white;
            padding: 20px 24px;
            text-align: center;
            position: relative;
        }
        .header h1 { font-size: 1.3em; margin-bottom: 4px; cursor: pointer; }
        .header .subtitle { font-size: 0.85em; opacity: 0.85; }
        .back-btn {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 1.1em;
            cursor: pointer;
            display: none;
        }
        .back-btn:hover { background: rgba(255,255,255,0.3); }
        .auto-toggle {
            position: absolute;
            top: 12px;
            right: 16px;
            display: none;
            align-items: center;
            gap: 6px;
            font-size: 0.75em;
            cursor: pointer;
            user-select: none;
        }
        .auto-toggle .toggle-switch {
            width: 40px; height: 22px;
            background: rgba(255,255,255,0.3);
            border-radius: 11px;
            position: relative;
            transition: background 0.3s;
        }
        .auto-toggle .toggle-switch.active { background: #4caf50; }
        .auto-toggle .toggle-switch::after {
            content: '';
            width: 18px; height: 18px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px; left: 2px;
            transition: transform 0.3s;
        }
        .auto-toggle .toggle-switch.active::after { transform: translateX(18px); }

        /* Screen management */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Category grid */
        .category-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 20px;
        }
        .category-card {
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-radius: 16px;
            padding: 20px 16px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            border: 2px solid transparent;
        }
        .category-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            border-color: #8e2de2;
        }
        .category-card .icon { font-size: 2em; margin-bottom: 8px; }
        .category-card .eng-name { font-size: 0.95em; font-weight: bold; color: #333; }
        .category-card .kor-name { font-size: 0.8em; color: #777; margin-top: 4px; }
        .category-card .item-count {
            display: inline-block;
            background: #8e2de2;
            color: white;
            border-radius: 10px;
            padding: 2px 10px;
            font-size: 0.7em;
            margin-top: 8px;
        }

        /* Intro card */
        .intro-card {
            grid-column: span 2;
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: white;
        }
        .intro-card .eng-name { color: white; }
        .intro-card .kor-name { color: rgba(255,255,255,0.8); }
        .intro-card .item-count { background: rgba(255,255,255,0.3); }

        /* Item list */
        .item-list { padding: 16px; }
        .item-card {
            background: #f8f9fa;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
            border-left: 4px solid #8e2de2;
        }
        .item-card:hover {
            background: #f0f0f0;
            transform: translateX(4px);
        }
        .item-card .item-num {
            display: inline-block;
            background: #8e2de2;
            color: white;
            border-radius: 50%;
            width: 28px; height: 28px;
            text-align: center;
            line-height: 28px;
            font-size: 0.8em;
            margin-right: 10px;
        }
        .item-card .item-title { font-size: 0.95em; color: #333; }
        .item-card .sent-count { font-size: 0.75em; color: #999; margin-top: 4px; margin-left: 38px; }

        /* Study area */
        .progress-container { background: #f0f0f0; height: 6px; }
        .progress-bar {
            background: linear-gradient(90deg, #4a00e0, #8e2de2);
            height: 100%;
            transition: width 0.4s ease;
        }
        .progress-text { text-align: center; font-size: 0.8em; color: #888; padding: 8px 0 4px; }
        .korean-area { padding: 20px; text-align: center; }
        .korean-label { font-size: 0.75em; color: #999; letter-spacing: 2px; margin-bottom: 8px; }
        .korean-sentence {
            font-size: 1.3em; line-height: 1.6; color: #333;
            margin-bottom: 12px; min-height: 50px;
            display: flex; align-items: center; justify-content: center;
        }
        .status-indicator {
            display: inline-flex; align-items: center; gap: 8px;
            padding: 8px 20px; border-radius: 50px;
            font-size: 0.9em; font-weight: bold; transition: all 0.3s;
        }
        .status-indicator.listening { background: #e3f2fd; color: #1565c0; }
        .status-indicator.recording { background: #ffebee; color: #c62828; animation: recordPulse 1.5s infinite; }
        .status-indicator.result { background: #f3e5f5; color: #7b1fa2; }
        .status-indicator.waiting { background: #fff3e0; color: #e65100; }
        @keyframes recordPulse { 0% {opacity:1} 50% {opacity:0.7} 100% {opacity:1} }
        .divider { height: 1px; background: #eee; margin: 0 24px; }
        .english-area { padding: 20px; text-align: center; }
        .english-label { font-size: 0.75em; color: #999; letter-spacing: 2px; margin-bottom: 12px; }
        .recognized-text {
            background: #f8f9fa; border-radius: 12px; padding: 14px;
            margin: 10px 0; min-height: 40px; font-size: 1em;
            color: #555; text-align: left; line-height: 1.5;
        }
        .recognized-text .label { font-size: 0.75em; color: #999; display: block; margin-bottom: 4px; }
        .result-area { margin: 10px 0; display: none; }
        .result-area.show { display: block; }
        .result-box { border-radius: 12px; padding: 14px; text-align: center; }
        .result-box.correct { background: #e8f5e9; border: 2px solid #4caf50; }
        .result-box.partial { background: #fff3e0; border: 2px solid #ff9800; }
        .result-box.incorrect { background: #ffebee; border: 2px solid #f44336; }
        .result-icon { font-size: 1.8em; margin-bottom: 2px; }
        .result-text { font-size: 0.95em; font-weight: bold; }
        .result-box.correct .result-text { color: #2e7d32; }
        .result-box.partial .result-text { color: #e65100; }
        .result-box.incorrect .result-text { color: #c62828; }
        .similarity { font-size: 0.8em; color: #777; margin-top: 4px; }
        .show-answer-btn {
            background: white; border: 2px solid #4a00e0; color: #4a00e0;
            border-radius: 50px; padding: 8px 20px; font-size: 0.9em;
            cursor: pointer; transition: all 0.3s; margin-top: 8px;
        }
        .preview-btn {
            background: white; border: 2px solid #ff9800; color: #e65100;
            border-radius: 50px; padding: 8px 20px; font-size: 0.9em;
            cursor: pointer; transition: all 0.3s; margin-top: 8px;
        }
        .preview-btn:hover { background: #ff9800; color: white; }
        .preview-btn.active { background: #ff9800; color: white; }
        .preview-reveal {
            display: none; background: #fff3e0; border-radius: 12px;
            padding: 14px; margin-top: 10px; text-align: left;
        }
        .preview-reveal.show { display: block; }
        .preview-reveal .label { font-size: 0.75em; color: #e65100; font-weight: bold; margin-bottom: 4px; }
        .preview-reveal .english-preview { font-size: 1.05em; color: #bf360c; line-height: 1.5; }
        .show-answer-btn:hover { background: #4a00e0; color: white; }
        .answer-reveal {
            display: none; background: #f3e5f5; border-radius: 12px;
            padding: 14px; margin-top: 10px; text-align: left;
        }
        .answer-reveal.show { display: block; }
        .answer-reveal .label { font-size: 0.75em; color: #7b1fa2; font-weight: bold; margin-bottom: 4px; }
        .answer-reveal .english-answer { font-size: 1.05em; color: #4a148c; line-height: 1.5; }
        .score-area { text-align: center; padding: 0 24px 8px; }
        .score-badge {
            display: inline-block; background: #f3e5f5; color: #7b1fa2;
            padding: 4px 14px; border-radius: 20px; font-size: 0.85em; font-weight: bold;
        }
        .auto-countdown { font-size: 0.8em; color: #999; margin-top: 8px; }
        .nav-area { display: flex; justify-content: space-between; padding: 12px 24px 20px; gap: 12px; }
        .nav-btn {
            flex: 1; padding: 12px; border: none; border-radius: 12px;
            font-size: 1em; cursor: pointer; transition: all 0.3s; font-weight: bold;
        }
        .nav-btn.prev { background: #f5f5f5; color: #666; }
        .nav-btn.prev:hover { background: #e0e0e0; }
        .nav-btn.next { background: linear-gradient(135deg, #4a00e0, #8e2de2); color: white; }
        .nav-btn.next:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(74,0,224,0.4); }
        .nav-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

        /* Start screen */
        .start-screen { padding: 40px 24px; text-align: center; }
        .start-screen h2 { font-size: 1.3em; color: #333; margin-bottom: 12px; }
        .start-screen p { color: #777; margin-bottom: 24px; line-height: 1.6; }
        .start-btn {
            background: linear-gradient(135deg, #4a00e0, #8e2de2);
            color: white; border: none; border-radius: 50px;
            padding: 16px 40px; font-size: 1.2em; cursor: pointer; transition: all 0.3s;
        }
        .start-btn:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(74,0,224,0.4); }

        @media (max-width: 480px) {
            body { padding: 8px; }
            .container { border-radius: 16px; margin-top: 8px; }
            .header { padding: 16px; }
            .header h1 { font-size: 1.1em; }
            .header .subtitle { font-size: 0.75em; }
            .back-btn { left: 10px; width: 28px; height: 28px; font-size: 0.9em; }
            .auto-toggle { top: 8px; right: 10px; font-size: 0.65em; }
            .auto-toggle .toggle-switch { width: 34px; height: 18px; }
            .auto-toggle .toggle-switch::after { width: 14px; height: 14px; }
            .category-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 10px; }
            .category-card { padding: 12px 8px; border-radius: 12px; }
            .category-card .icon { font-size: 1.4em; margin-bottom: 4px; }
            .category-card .eng-name { font-size: 0.8em; }
            .category-card .kor-name { font-size: 0.7em; }
            .category-card .item-count { font-size: 0.65em; padding: 1px 8px; }
            .intro-card { padding: 14px 10px; }
            .item-list { padding: 10px; }
            .item-card { padding: 12px; margin-bottom: 8px; border-radius: 10px; }
            .item-card .item-num { width: 24px; height: 24px; line-height: 24px; font-size: 0.7em; margin-right: 8px; }
            .item-card .item-title { font-size: 0.85em; }
            .item-card .sent-count { font-size: 0.7em; margin-left: 32px; }
            .korean-area { padding: 14px; }
            .korean-sentence { font-size: 1.05em; min-height: 40px; line-height: 1.5; }
            .status-indicator { padding: 6px 14px; font-size: 0.8em; }
            .english-area { padding: 14px; }
            .recognized-text { padding: 10px; font-size: 0.9em; }
            .result-box { padding: 10px; }
            .result-icon { font-size: 1.5em; }
            .result-text { font-size: 0.85em; }
            .nav-area { padding: 10px 16px 16px; }
            .nav-btn { padding: 10px; font-size: 0.9em; }
            .start-screen { padding: 30px 20px; }
            .start-screen h2 { font-size: 1.1em; }
            .start-btn { padding: 14px 30px; font-size: 1em; }
        }
        @media (max-width: 360px) {
            .category-grid { grid-template-columns: repeat(2, 1fr); gap: 6px; padding: 8px; }
            .category-card { padding: 10px 6px; }
            .category-card .icon { font-size: 1.2em; }
            .category-card .eng-name { font-size: 0.75em; }
